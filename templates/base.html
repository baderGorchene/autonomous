<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookSlot{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/forms.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">BookSlot</a>
            <div class="lang-toggle">
                <a href="?lang=en" class="{% if lang == 'en' %}active{% endif %}">EN</a>
                <a href="?lang=ar" class="{% if lang == 'ar' %}active{% endif %}">AR</a>
                <a href="?lang=fr" class="{% if lang == 'fr' %}active{% endif %}">FR</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2024 BookSlot. All rights reserved.</p>
    </footer>
    {% block scripts_extra %}{% endblock %}
</body>
</html>
