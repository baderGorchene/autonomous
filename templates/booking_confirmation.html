<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
</head>
<body>
    <h1>Booking Confirmed!</h1>
    <p>Your booking for {{ booking.service }} on {{ booking.datetime.strftime('%Y-%m-%d %H:%M') }} has been confirmed.</p>
    <p>A confirmation email has been sent to {{ booking.customer_email }}.</p>
    <p>Thank you for booking with {{ owner.business_name }}.</p>
    <a href="/book/{{ owner.slug }}">Book another appointment</a>
</body>
</html>
