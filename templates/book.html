<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>{{ _('Book a slot with') }} {{ owner.business_name }}</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.5rem; }
        button { background: #007bff; color: white; border: none; padding: 1rem; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h1>{{ owner.business_name }}</h1>
    <form action="/book/{{ owner.slug }}/submit" method="POST">
        <div class="form-group">
            <label>{{ _('Select Service') }}</label>
            <select name="service" required>
                {% for service in owner.services_json %}
                <option value="{{ service }}">{{ service }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>{{ _('Date & Time') }}</label>
            <input type="datetime-local" name="datetime" required>
        </div>
        <div class="form-group">
            <label>{{ _('Your Name') }}</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>{{ _('Your Phone') }}</label>
            <input type="tel" name="phone" required>
        </div>
        <button type="submit">{{ _('Confirm Booking') }}</button>
    </form>
</body>
</html>
