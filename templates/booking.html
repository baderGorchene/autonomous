<div x-data="{ date: new Date().toISOString().split('T')[0], slots: [], loading: true }" x-init="slots = await (await fetch(`/book/availability/{{ owner_slug }}?date=${date}`)).json(); loading = false">
  <h1 class="text-2xl font-bold mb-4">{{ _('Book an Appointment') }}</h1>
  <input type="date" x-model="date" @change="loading = true; slots = await (await fetch(`/book/availability/{{ owner_slug }}?date=${date}`)).json(); loading = false" class="border p-2 rounded">
  
  <div x-show="loading" class="mt-4">{{ _('Loading available slots...') }}</div>
  
  <div x-show="!loading" class="grid grid-cols-3 gap-2 mt-4">
    <template x-for="slot in slots" :key="slot">
      <button class="p-2 border rounded hover:bg-blue-500 hover:text-white" @click="selectedSlot = slot">
        <span x-text="slot"></span>
      </button>
    </template>
  </div>
</div>
