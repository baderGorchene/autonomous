<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>{{ _('Book with') }} {{ owner.business_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-sm">
        <h1 class="text-2xl font-bold mb-6">{{ _('Book your slot') }}</h1>
        <form action="/book/{{ owner.slug }}/confirm" method="POST">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ _('Select Service') }}</label>
                <select name="service" class="w-full border p-2 rounded" required>
                    {% for service in owner.services_json %}
                        <option value="{{ service.name }}">{{ service.name }} ({{ service.price }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ _('Pick a Time') }}</label>
                <input type="datetime-local" name="datetime" class="w-full border p-2 rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ _('Your Name') }}</label>
                <input type="text" name="customer_name" class="w-full border p-2 rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ _('Phone Number') }}</label>
                <input type="tel" name="customer_phone" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">{{ _('Confirm Booking') }}</button>
        </form>
    </div>
</body>
</html>
