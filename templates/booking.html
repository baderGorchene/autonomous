<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>{{ _('Book with') }} {{ owner.business_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-sm">
        <h1 class="text-2xl font-bold mb-4">{{ owner.business_name }}</h1>
        <form action="/book/{{ owner.slug }}/confirm" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">{{ _('Select Service') }}</label>
                <select name="service" class="w-full border p-2 rounded" required>
                    {% for service in owner.services_json %}
                    <option value="{{ service }}">{{ service }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Date & Time') }}</label>
                <input type="datetime-local" name="datetime" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Name') }}</label>
                <input type="text" name="customer_name" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('WhatsApp/Phone') }}</label>
                <input type="tel" name="customer_phone" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">{{ _('Confirm Booking') }}</button>
        </form>
    </div>
</body>
</html>
