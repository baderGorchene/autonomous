<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>{{ owner.business_name }} - Booking</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>{{ _('Book a session with') }} {{ owner.business_name }}</h1>
    <form id="bookingForm">
        <input type="text" name="customer_name" placeholder="{{ _('Your Name') }}" required />
        <input type="email" name="customer_email" placeholder="{{ _('Your Email') }}" required />
        <input type="tel" name="customer_phone" placeholder="{{ _('Your Phone') }}" required />
        <select name="service" required>
            {% for service in owner.services_json %}
            <option value="{{ service }}">{{ service }}</option>
            {% endfor %}
        </select>
        <input type="datetime-local" name="booking_datetime" required />
        <button type="submit">{{ _('Confirm Booking') }}</button>
    </form>
    <div id="message"></div>
    <script>
        document.querySelector('#bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            try {
                await axios.post(window.location.pathname.replace('/book/', '/book/') + '/submit', formData, {
                    headers: {'Content-Type': 'application/json'}
                });
                document.querySelector('#message').innerText = '{{ _("Booking confirmed!") }}';
            } catch (err) {
                document.querySelector('#message').innerText = '{{ _("Error submitting booking.") }}';
            }
        });
    </script>
</body>
</html>
