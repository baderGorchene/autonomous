<!DOCTYPE html><html dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}" lang="{{ lang }}"><head><meta charset="UTF-8"><title>{{ _('Book an Appointment') }}</title></head><body><h1>{{ _('Book with') }} {{ owner.business_name }}</h1><form action="/book/{{ owner.slug }}/submit" method="POST"><input type="text" name="customer_name" placeholder="{{ _('Your Name') }}" required><input type="email" name="customer_email" placeholder="{{ _('Your Email') }}" required><input type="tel" name="customer_phone" placeholder="{{ _('Your Phone') }}" required><select name="service">{% for s in owner.services_json %}<option value="{{ s }}">{{ s }}</option>{% endfor %}</select><input type="datetime-local" name="booking_datetime" required><button type="submit">{{ _('Confirm Booking') }}</button></form></body></html>
