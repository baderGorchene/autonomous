<div x-data="{
    form: { name: '', email: '', phone: '', service: '', date: '' },
    errors: {},
    submitting: false,
    validate() {
        this.errors = {};
        if (!this.form.name) this.errors.name = 'Required';
        if (!this.form.email) this.errors.email = 'Required';
        if (!this.form.phone) this.errors.phone = 'Required';
        return Object.keys(this.errors).length === 0;
    },
    async submit() {
        if (!this.validate()) return;
        this.submitting = true;
        try {
            const response = await fetch('/book/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form)
            });
            if (response.ok) alert('Booking confirmed!');
        } finally {
            this.submitting = false;
        }
    }
}">
    <form @submit.prevent="submit">
        <input x-model="form.name" placeholder="Name" required>
        <span x-text="errors.name"></span>
        <input x-model="form.email" type="email" placeholder="Email" required>
        <input x-model="form.phone" placeholder="Phone" required>
        <button type="submit" :disabled="submitting">Book Now</button>
    </form>
</div>
