<html><body>
<h1>Book with {{ owner.business_name }}</h1>
<select id="date" onchange="fetchSlots()">
    <option value="2023-10-27">2023-10-27</option>
</select>
<select id="slots"></select>
<script>
async function fetchSlots() {
    const date = document.getElementById('date').value;
    const response = await fetch(`/book/{{ owner.slug }}/slots?date=${date}`);
    const data = await response.json();
    const select = document.getElementById('slots');
    select.innerHTML = data.slots.map(s => `<option value="${s}">${s}</option>`).join('');
}
</script>
</body></html>
