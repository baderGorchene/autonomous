{% extends "base.html" %}
{% block title %}{{ _('Book an appointment with') }} {{ owner.business_name }}{% endblock %}
{% block content %}
<div class="container">
    <h1>{{ _('Book with') }} {{ owner.business_name }}</h1>
    <form method="POST" action="/book/submit/{{ owner.slug }}">
        <div class="form-group">
            <label>{{ _('Select Service') }}</label>
            <select name="service" required class="form-control">
                {% for service in owner.services_json %}
                    <option value="{{ service.name }}">{{ service.name }} - {{ service.price }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>{{ _('Select Date & Time') }}</label>
            <input type="datetime-local" name="datetime" required class="form-control">
        </div>
        <div class="form-group">
            <label>{{ _('Your Name') }}</label>
            <input type="text" name="customer_name" required class="form-control">
        </div>
        <div class="form-group">
            <label>{{ _('Your Phone') }}</label>
            <input type="tel" name="customer_phone" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">{{ _('Confirm Booking') }}</button>
    </form>
</div>
{% endblock %}
