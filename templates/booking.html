<!DOCTYPE html>
<html dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}" lang="{{ lang }}">
<head><title>Book Appointment</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-6">
  <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6">Book an Appointment</h1>
    <form action="submit" method="POST" class="space-y-4">
      <input type="text" name="customer_name" placeholder="Your Name" required class="w-full p-2 border rounded">
      <input type="email" name="customer_email" placeholder="Your Email" required class="w-full p-2 border rounded">
      <input type="tel" name="customer_phone" placeholder="Your Phone" required class="w-full p-2 border rounded">
      <select name="service" class="w-full p-2 border rounded">
        {% for service in services %}<option value="{{ service }}">{{ service }}</option>{% endfor %}
      </select>
      <input type="datetime-local" name="booking_time" required class="w-full p-2 border rounded">
      <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Confirm Booking</button>
    </form>
  </div>
</body>
</html>
