{% extends "base.html" %}
{% block content %}
<h1>{{ _('Book an Appointment with') }} {{ owner.business_name }}</h1>
<form action="/book/{{ owner.slug }}/create" method="POST">
    <input type="text" name="name" placeholder="{{ _('Your Name') }}" required>
    <input type="email" name="email" placeholder="{{ _('Your Email') }}" required>
    <input type="tel" name="phone" placeholder="{{ _('Your Phone') }}" required>
    <select name="service">
        {% for service in owner.services_json %}
        <option value="{{ service }}">{{ service }}</option>
        {% endfor %}
    </select>
    <input type="datetime-local" name="time" required>
    <button type="submit">{{ _('Confirm Booking') }}</button>
</form>
{% endblock %}
