<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>{{ _('Book with') }} {{ owner.business_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h2 class="card-title mb-4">{{ _('Book an appointment') }}</h2>
                <form action="/book/{{ owner.slug }}/submit?lang={{ lang }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Full Name') }}</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Email') }}</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Phone') }}</label>
                        <input type="tel" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Select Service') }}</label>
                        <select name="service" class="form-select" required>
                            {% for service in owner.services_json %}
                                <option value="{{ service }}">{{ service }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Date & Time') }}</label>
                        <input type="datetime-local" name="date_time" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{ _('Confirm Booking') }}</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
