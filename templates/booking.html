<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>{{ _('Book an appointment with') }} {{ owner.business_name }}</title>
    <style>body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }</style>
</head>
<body>
    <h1>{{ _('Book with') }} {{ owner.business_name }}</h1>
    <form action="/book/{{ owner.slug }}/submit" method="POST">
        <label>{{ _('Name') }}:</label><br>
        <input type="text" name="name" required><br><br>
        
        <label>{{ _('Phone') }}:</label><br>
        <input type="tel" name="phone" required><br><br>
        
        <label>{{ _('Service') }}:</label><br>
        <select name="service">
            {% for service in owner.services_json %}
            <option value="{{ service }}">{{ service }}</option>
            {% endfor %}
        </select><br><br>
        
        <label>{{ _('Date & Time') }}:</label><br>
        <input type="datetime-local" name="datetime" required><br><br>
        
        <button type="submit">{{ _('Confirm Booking') }}</button>
    </form>
</body>
</html>
