<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>{{ owner.business_name }} - BookSlot</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .service-card { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>{{ owner.business_name }}</h1>
    <form action="/book/{{ owner.slug }}/submit" method="POST">
        <h3>Select Service</h3>
        {% for service in owner.services_json %}
            <div class="service-card">
                <input type="radio" name="service" value="{{ service.name }}" required> {{ service.name }} - {{ service.price }}
            </div>
        {% endfor %}

        <h3>Select Time</h3>
        <select name="booking_time" required>
            {% for slot in available_slots %}
                <option value="{{ slot }}">{{ slot }}</option>
            {% endfor %}
        </select>

        <h3>Your Details</h3>
        <input type="text" name="customer_name" placeholder="Name" required><br><br>
        <input type="email" name="customer_email" placeholder="Email" required><br><br>
        <input type="tel" name="customer_phone" placeholder="Phone" required><br><br>
        <button type="submit">Confirm Booking</button>
    </form>
</body>
</html>
