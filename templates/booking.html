{% extends "base.html" %}{% block content %}<h1 class="text-2xl font-bold mb-4">{{ owner.business_name }}</h1><form action="/book/{{ owner.slug }}/submit?lang={{ lang }}" method="POST" class="space-y-4"><input type="text" name="customer_name" placeholder="Your Name" required class="w-full p-2 border"><input type="email" name="customer_email" placeholder="Your Email" required class="w-full p-2 border"><input type="tel" name="customer_phone" placeholder="Your Phone" required class="w-full p-2 border"><select name="service" class="w-full p-2 border">{% for service in services %}<option value="{{ service }}">{{ service }}</option>{% endfor %}</select><input type="datetime-local" name="booking_time" required class="w-full p-2 border"><button type="submit" class="bg-blue-600 text-white p-2 w-full">Book Now</button></form>{% endblock %}
