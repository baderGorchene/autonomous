<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>{{ owner.business_name }} | BookSlot</title>
</head>
<body>
    <h1>Book with {{ owner.business_name }}</h1>
    <form id="bookingForm" action="/book/submit" method="POST">
        <input type="hidden" name="owner_id" value="{{ owner.id }}">
        <input type="text" name="customer_name" placeholder="Your Name" required>
        <input type="email" name="customer_email" placeholder="Your Email" required>
        <input type="tel" name="customer_phone" placeholder="Your Phone" required>
        <select name="service">
            {% for service in owner.services_json %}
            <option value="{{ service }}">{{ service }}</option>
            {% endfor %}
        </select>
        <input type="datetime-local" name="datetime" required>
        <button type="submit">Confirm Booking</button>
    </form>
    <script>
        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            const response = await fetch('/book/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (response.ok) alert('Booking success!');
        });
    </script>
</body>
</html>
