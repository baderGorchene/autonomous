<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>{{ _('Book a service with') }} {{ owner.business_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm">
        <h1 class="text-2xl font-bold mb-6">{{ owner.business_name }}</h1>
        <form action="/book/slots/{{ owner.slug }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">{{ _('Full Name') }}</label>
                <input type="text" name="customer_name" required class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Email') }}</label>
                <input type="email" name="customer_email" required class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Phone') }}</label>
                <input type="tel" name="customer_phone" required class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Preferred Date & Time') }}</label>
                <input type="datetime-local" name="datetime" required class="w-full p-2 border rounded">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700">
                {{ _('Confirm Booking') }}
            </button>
        </form>
    </div>
</body>
</html>
