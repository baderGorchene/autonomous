<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>Book with {{ owner.business_name }}</title>
    <style>body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }</style>
</head>
<body>
    <h1>{{ _('Book an appointment') }}</h1>
    <form id="bookingForm">
        <input type="hidden" id="owner_id" value="{{ owner.id }}">
        <label>{{ _('Name') }}</label><input type="text" id="customer_name" required><br>
        <label>{{ _('Email') }}</label><input type="email" id="customer_email" required><br>
        <label>{{ _('Phone') }}</label><input type="tel" id="customer_phone" required><br>
        <label>{{ _('Service') }}</label><input type="text" id="service" required><br>
        <label>{{ _('Date & Time') }}</label><input type="datetime-local" id="datetime" required><br>
        <button type="submit">{{ _('Confirm Booking') }}</button>
    </form>
    <script>
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch('/book/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    owner_id: parseInt(document.getElementById('owner_id').value),
                    customer_name: document.getElementById('customer_name').value,
                    customer_email: document.getElementById('customer_email').value,
                    customer_phone: document.getElementById('customer_phone').value,
                    service: document.getElementById('service').value,
                    datetime: document.getElementById('datetime').value
                })
            });
            if (response.ok) alert('{{ _("Booking successful!") }}');
            else alert('{{ _("Error submitting booking.") }}');
        });
    </script>
</body>
</html>
