<div id="booking-container">
    <label for="date-picker">Select Date:</label>
    <input type="date" id="date-picker" name="date">
    <div id="slots-container"></div>
</div>

<script>
    const datePicker = document.getElementById('date-picker');
    const slotsContainer = document.getElementById('slots-container');

    datePicker.addEventListener('change', async (e) => {
        const selectedDate = e.target.value;
        const ownerSlug = window.location.pathname.split('/')[2];
        
        slotsContainer.innerHTML = '<p>Loading slots...</p>';
        
        try {
            const response = await fetch(`/book/slots/${ownerSlug}?date=${selectedDate}`);
            const slots = await response.json();
            
            slotsContainer.innerHTML = '';
            if (slots.length === 0) {
                slotsContainer.innerHTML = '<p>No slots available.</p>';
                return;
            }
            
            slots.forEach(slot => {
                const button = document.createElement('button');
                button.innerText = slot;
                button.onclick = () => selectSlot(slot);
                slotsContainer.appendChild(button);
            });
        } catch (error) {
            slotsContainer.innerHTML = '<p>Error loading slots. Please try again.</p>';
        }
    });

    function selectSlot(time) {
        console.log('Selected time:', time);
    }
</script>
