<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>Book with {{ owner.business_name }}</title>
</head>
<body>
    <h1>Book an appointment with {{ owner.business_name }}</h1>
    <form id="bookingForm">
        <input type="hidden" name="owner_id" value="{{ owner.id }}">
        <input type="text" name="customer_name" placeholder="Your Name" required>
        <input type="email" name="customer_email" placeholder="Your Email" required>
        <input type="tel" name="customer_phone" placeholder="Your Phone" required>
        <select name="service" required>
            {% for service in owner.services_json %}
                <option value="{{ service }}">{{ service }}</option>
            {% endfor %}
        </select>
        <input type="datetime-local" name="datetime" required>
        <button type="submit">Confirm Booking</button>
    </form>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const response = await fetch('/book/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if (response.ok) alert('Booking confirmed!');
            else alert('Error: ' + (await response.json()).detail);
        });
    </script>
</body>
</html>
