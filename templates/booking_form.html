<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>Book an Appointment</title>
</head>
<body>
    <h1>Book a Slot with {{ owner.business_name }}</h1>
    <form action="/book/submit" method="POST">
        <input type="hidden" name="owner_id" value="{{ owner.id }}">
        <label>Name: <input type="text" name="customer_name" required></label><br>
        <label>Email: <input type="email" name="customer_email" required></label><br>
        <label>Phone: <input type="text" name="customer_phone" required></label><br>
        <label>Service:
            <select name="service">
                {% for service in owner.services_json %}
                <option value="{{ service }}">{{ service }}</option>
                {% endfor %}
            </select>
        </label><br>
        <label>Date & Time: <input type="datetime-local" name="datetime" required></label><br>
        <button type="submit">Confirm Booking</button>
    </form>
</body>
</html>
