{% extends "base.html" %}
{% block content %}
<div class="booking-container">
    <h1>{{ _('Book with') }} {{ owner.business_name }}</h1>
    <form action="/book/{{ owner.slug }}/submit" method="POST">
        <div class="form-group">
            <label>{{ _('Your Name') }}</label>
            <input type="text" name="customer_name" required>
        </div>
        <div class="form-group">
            <label>{{ _('Email') }}</label>
            <input type="email" name="customer_email" required>
        </div>
        <div class="form-group">
            <label>{{ _('Phone') }}</label>
            <input type="tel" name="customer_phone" required>
        </div>
        <div class="form-group">
            <label>{{ _('Select Service') }}</label>
            <select name="service" required>
                {% for service in owner.services_json %}
                <option value="{{ service }}">{{ service }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>{{ _('Date & Time') }}</label>
            <input type="datetime-local" name="booking_datetime" required>
        </div>
        <button type="submit">{{ _('Confirm Booking') }}</button>
    </form>
</div>
{% endblock %}
