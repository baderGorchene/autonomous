<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>{{ owner.business_name }} | {{ _('Book Appointment') }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-md mx-auto p-6">
        <h1 class="text-2xl font-bold mb-4">{{ owner.business_name }}</h1>
        <form action="/book/{{ owner.slug }}/confirm" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">{{ _('Select Service') }}</label>
                <select name="service" class="w-full p-2 border rounded" required>
                    {% for service in services %}
                        <option value="{{ service.name }}">{{ service.name }} - {{ service.price }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Select Time') }}</label>
                <select name="datetime" class="w-full p-2 border rounded" required>
                    {% for slot in availability %}
                        <option value="{{ slot }}">{{ slot }}</option>
                    {% endfor %}
                </select>
            </div>
            <input type="text" name="customer_name" placeholder="{{ _('Your Name') }}" class="w-full p-2 border rounded" required>
            <input type="email" name="customer_email" placeholder="{{ _('Your Email') }}" class="w-full p-2 border rounded" required>
            <input type="tel" name="customer_phone" placeholder="{{ _('Your WhatsApp Number') }}" class="w-full p-2 border rounded" required>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold">{{ _('Confirm Booking') }}</button>
        </form>
    </div>
</body>
</html>
