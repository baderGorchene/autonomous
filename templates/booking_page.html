<div x-data="{ 
    selectedService: '', 
    selectedTime: '', 
    services: {{ owner.services_json | tojson }}, 
    availability: {{ owner.availability_json | tojson }}
}">
    <label>Select Service</label>
    <select x-model="selectedService">
        <option value="" disabled>Choose a service...</option>
        <template x-for="service in services" :key="service.name">
            <option :value="service.name" x-text="service.name"></option>
        </template>
    </select>

    <div x-show="selectedService">
        <label>Select Time Slot</label>
        <select x-model="selectedTime">
            <option value="" disabled>Choose a time...</option>
            <template x-for="slot in availability" :key="slot">
                <option :value="slot" x-text="slot"></option>
            </template>
        </select>
    </div>

    <div x-show="selectedService && selectedTime">
        <p>Selected <span x-text="selectedService"></span> at <span x-text="selectedTime"></span></p>
        <button>Confirm Booking</button>
    </div>
</div>
