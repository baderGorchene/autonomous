<!DOCTYPE html>
<html lang="{{ lang }}">
<head><title>{{ owner.business_name }} Booking</title></head>
<body>
    <h1>{{ owner.business_name }}</h1>
    <form action="/book/confirm" method="POST">
        <label>Select Service:</label>
        <select name="service" required>
            {% for service in services %}
                <option value="{{ service.name }}">{{ service.name }} ({{ service.price }})</option>
            {% endfor %}
        </select>
        <label>Date & Time:</label>
        <input type="datetime-local" name="booking_time" required>
        <input type="text" name="customer_name" placeholder="Your Name" required>
        <input type="tel" name="customer_phone" placeholder="WhatsApp Number" required>
        <button type="submit">Book Slot</button>
    </form>
</body>
</html>
