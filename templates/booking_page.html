<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _("Book an appointment with") }} {{ owner.business_name }}</title>
</head>
<body>
    <h1>{{ _("Book an appointment") }}</h1>
    <p>{{ _("Welcome to") }} {{ owner.business_name }}'s {{ _("booking page") }}.</p>

    <form action="/book/{{ owner.slug }}/book" method="post">
        <label for="customer_name">{{ _("Customer Name") }}:</label>
        <input type="text" id="customer_name" name="customer_name" required><br>
        
        <label for="customer_email">{{ _("Customer Email") }}:</label>
        <input type="email" id="customer_email" name="customer_email" required><br>

        <label for="customer_phone">{{ _("Customer Phone") }}:</label>
        <input type="text" id="customer_phone" name="customer_phone" required><br>

        <label for="service">{{ _("Service") }}:</label>
        <select id="service" name="service" required>
            <option value="">{{ _("Select a service") }}</option>
            {% for service_item in owner.services_json %}
            <option value="{{ service_item.name }}">{{ service_item.name }}</option>
            {% endfor %}
        </select><br>

        <label for="booking_date">{{ _("Date") }}:</label>
        <input type="date" id="booking_date" name="booking_date" required><br>

        <label for="booking_time">{{ _("Time") }}:</label>
        <input type="time" id="booking_time" name="booking_time" required><br>

        <button type="submit">{{ _("Book Now") }}</button>
    </form>

    <a href="?lang=en">English</a> | <a href="?lang=ar">العربية</a> | <a href="?lang=fr">Français</a>
</body>
</html>
