<!DOCTYPE html><html lang="{{ lang }}"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ owner.business_name }} - {{ _('Book an Appointment') }}</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="container"><div class="lang-switcher"><a href="?lang=en" class="{{ 'active' if lang == 'en' else '' }}">English</a><a href="?lang=ar" class="{{ 'active' if lang == 'ar' else '' }}">العربية</a><a href="?lang=fr" class="{{ 'active' if lang == 'fr' else '' }}">Français</a></div><h1>{{ owner.business_name }}</h1><h2>{{ _('Book Your Service') }}</h2>{% if message %}<div class="message success">{{ message }}</div>{% endif %}{% if error %}<div class="message error">{{ error }}</div>{% endif %}<form action="/book/{{ owner.slug }}" method="post"><div class="form-group"><label for="customer_name">{{ _('Your Name:') }}</label><input type="text" id="customer_name" name="customer_name" required></div><div class="form-group"><label for="customer_email">{{ _('Your Email:') }}</label><input type="email" id="customer_email" name="customer_email" required></div><div class="form-group"><label for="customer_phone">{{ _('Your Phone (WhatsApp preferred):') }}</label><input type="tel" id="customer_phone" name="customer_phone"></div><div class="form-group"><label for="service">{{ _('Select Service:') }}</label><select id="service" name="service" required>{% for service in owner.services_json %}<option value="{{ service.name }}">{{ service.name }} - {{ service.duration }} {{ _('mins') }}</option>{% endfor %}</select></div><div class="form-group"><label for="datetime">{{ _('Preferred Date and Time:') }}</label><input type="datetime-local" id="datetime" name="datetime" required></div><button type="submit">{{ _('Book Now') }}</button></form></div></body></html>
