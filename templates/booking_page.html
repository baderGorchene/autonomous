<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _("Book an Appointment") }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="flex justify-end mb-4">
            <a href="?lang=en" class="text-blue-500 hover:underline mx-1">{{ _("English") }}</a> |
            <a href="?lang=ar" class="text-blue-500 hover:underline mx-1">{{ _("Arabic") }}</a> |
            <a href="?lang=fr" class="text-blue-500 hover:underline mx-1">{{ _("French") }}</a>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">{{ _("Book an Appointment") }}</h1>
        <p class="text-gray-600 mb-6 text-center">{{ owner.business_name }}</p>

        {% if message %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
            <span class="block sm:inline">{{ message }}</span>
        </div>
        {% endif %}

        <form action="/book/{{ owner.slug }}" method="post" class="space-y-4">
            <div>
                <label for="customer_name" class="block text-sm font-medium text-gray-700">{{ _("Your Name") }}</label>
                <input type="text" id="customer_name" name="customer_name" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div>
                <label for="customer_email" class="block text-sm font-medium text-gray-700">{{ _("Your Email") }}</label>
                <input type="email" id="customer_email" name="customer_email" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div>
                <label for="customer_phone" class="block text-sm font-medium text-gray-700">{{ _("Your Phone (WhatsApp preferred)") }}</label>
                <input type="text" id="customer_phone" name="customer_phone"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div>
                <label for="service" class="block text-sm font-medium text-gray-700">{{ _("Select a Service") }}</label>
                <select id="service" name="service" required
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">{{ _("-- Choose a service --") }}</option>
                    {% for service in owner.services_json %}
                    <option value="{{ service.name }}">{{ service.name }} - {{ service.duration }} {{ _("minutes") }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="datetime" class="block text-sm font-medium text-gray-700">{{ _("Preferred Date and Time") }}</label>
                <input type="datetime-local" id="datetime" name="datetime" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                {{ _("Book Now") }}
            </button>
        </form>
    </div>
</body>
</html>
