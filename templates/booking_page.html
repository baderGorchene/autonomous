<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>Book with {{ owner.business_name }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">{{ owner.business_name }}</h1>
        <form id="booking-form">
            <div class="mb-4">
                <label class="block mb-2">Select Date</label>
                <input type="date" name="date" class="w-full border p-2 rounded"
                       hx-get="/book/{{ owner.slug }}/availability"
                       hx-target="#slots-container"
                       hx-trigger="change">
            </div>
            <div id="slots-container" class="grid grid-cols-3 gap-2 mt-4">
                <!-- Available slots will appear here -->
            </div>
        </form>
    </div>
</body>
</html>
