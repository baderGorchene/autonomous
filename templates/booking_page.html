<div x-data="{ 
    name: '', 
    email: '', 
    phone: '', 
    owner_id: {{ owner.id }}, 
    service: 'Consultation', 
    bookingDate: '',
    submit() {
        fetch('/book/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                owner_id: this.owner_id,
                customer_name: this.name,
                customer_email: this.email,
                customer_phone: this.phone,
                service: this.service,
                datetime: this.bookingDate
            })
        }).then(res => res.json()).then(data => alert('Booking successful!'));
    }
}">
    <form @submit.prevent="submit">
        <input x-model="name" placeholder="Your Name" required>
        <input x-model="email" type="email" placeholder="Your Email" required>
        <input x-model="phone" type="tel" placeholder="Your Phone" required>
        <input x-model="bookingDate" type="datetime-local" required>
        <button type="submit">Confirm Booking</button>
    </form>
</div>
