<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>{{ owner.business_name }} | BookSlot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4">{{ _('Book with') }} {{ owner.business_name }}</h1>
        <form action="/book/{{ owner.slug }}/submit" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">{{ _('Service') }}</label>
                <select name="service" class="w-full p-2 border rounded" required>
                    {% for service in owner.services_json %}
                        <option value="{{ service }}">{{ service }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Your Name') }}</label>
                <input type="text" name="customer_name" class="w-full p-2 border rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Phone') }}</label>
                <input type="tel" name="customer_phone" class="w-full p-2 border rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Email') }}</label>
                <input type="email" name="customer_email" class="w-full p-2 border rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">{{ _('Date & Time') }}</label>
                <input type="datetime-local" name="booking_datetime" class="w-full p-2 border rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">
                {{ _('Confirm Booking') }}
            </button>
        </form>
    </div>
</body>
</html>
