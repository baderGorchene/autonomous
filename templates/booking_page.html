<form id="bookingForm">
  <input type="hidden" id="owner_id" value="{{ owner.id }}">
  <input type="text" id="customer_name" placeholder="Name" required>
  <input type="email" id="customer_email" placeholder="Email" required>
  <input type="tel" id="customer_phone" placeholder="Phone" required>
  <select id="service" required>
    {% for s in owner.services_json %}<option value="{{s}}">{{s}}</option>{% endfor %}
  </select>
  <input type="datetime-local" id="datetime" required>
  <button type="submit" id="submitBtn">Book Now</button>
</form>
<div id="message"></div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
  document.getElementById('bookingForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');
    btn.disabled = true;
    try {
      const response = await axios.post('/book/submit', {
        owner_id: parseInt(document.getElementById('owner_id').value),
        customer_name: document.getElementById('customer_name').value,
        customer_email: document.getElementById('customer_email').value,
        customer_phone: document.getElementById('customer_phone').value,
        service: document.getElementById('service').value,
        datetime: document.getElementById('datetime').value
      });
      msg.textContent = 'Booking successful!';
    } catch (err) {
      msg.textContent = 'Error: ' + (err.response?.data?.detail || err.message);
    } finally {
      btn.disabled = false;
    }
  };
</script>
