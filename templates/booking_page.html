<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSlot - {{ _('Book a Slot') }}</title>
</head>
<body>
    <h1>{{ _('Book an Appointment with') }} {{ owner.business_name }}</h1>
    <p>{{ _('Service') }}: {{ service.name }}</p>
    <p>{{ _('Price') }}: {{ service.price }}</p>
    <p>{{ _('Duration') }}: {{ service.duration }}</p>

    <form action="/book/{{ owner.slug }}/{{ service.id }}?lang={{ lang }}" method="post">
        <label for="customer_name">{{ _('Your Name') }}:</label>
        <input type="text" id="customer_name" name="customer_name" required><br>
        <label for="customer_email">{{ _('Your Email') }}:</label>
        <input type="email" id="customer_email" name="customer_email" required><br>
        <label for="customer_phone">{{ _('Your Phone') }}:</label>
        <input type="text" id="customer_phone" name="customer_phone" required><br>
        <label for="datetime">{{ _('Preferred Date and Time') }}:</label>
        <input type="datetime-local" id="datetime" name="datetime" required><br>
        <button type="submit">{{ _('Book Now') }}</button>
    </form>

    <a href="/book/{{ owner.slug }}/{{ service.id }}?lang=en">{{ _('English') }}</a> |
    <a href="/book/{{ owner.slug }}/{{ service.id }}?lang=ar">{{ _('Arabic') }}</a> |
    <a href="/book/{{ owner.slug }}/{{ service.id }}?lang=fr">{{ _('French') }}</a>
</body>
</html>
