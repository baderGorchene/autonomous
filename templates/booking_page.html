<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Book an appointment with {business_name}').format(business_name=owner.business_name) }}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .language-toggle a { margin-left: 10px; text-decoration: none; color: blue; }
        .language-toggle a.active { font-weight: bold; color: black; }
        .booking-form { max-width: 500px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .booking-form label { display: block; margin-bottom: 5px; }
        .booking-form input, .booking-form select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .booking-form button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .booking-form button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ _('Book an appointment with {business_name}').format(business_name=owner.business_name) }}</h1>
        <div class="language-toggle">
            <a href="?lang=en" class="{{ 'active' if lang == 'en' }}">English</a>
            <a href="?lang=ar" class="{{ 'active' if lang == 'ar' }}">العربية</a>
            <a href="?lang=fr" class="{{ 'active' if lang == 'fr' }}">Français</a>
        </div>
    </div>

    <div class="booking-form">
        <form action="/book/{{ owner.slug }}/submit" method="post">
            <label for="service">{{ _('Service') }}:</label>
            <select id="service" name="service" required>
                {% for service in owner.services_json %}
                    <option value="{{ service.name }}">{{ service.name }}</option>
                {% endfor %}
            </select>

            <label for="date">{{ _('Date') }}:</label>
            <input type="date" id="date" name="date" required>

            <label for="time">{{ _('Time') }}:</label>
            <input type="time" id="time" name="time" required>

            <label for="customer_name">{{ _('Your Name') }}:</label>
            <input type="text" id="customer_name" name="customer_name" required>

            <label for="customer_email">{{ _('Your Email') }}:</label>
            <input type="email" id="customer_email" name="customer_email" required>

            <label for="customer_phone">{{ _('Your Phone (WhatsApp)') }}:</label>
            <input type="text" id="customer_phone" name="customer_phone">

            <button type="submit">{{ _('Book Now') }}</button>
        </form>
    </div>
</body>
</html>
