<div x-data="bookingForm()">
    <form @submit.prevent="submitBooking" class="space-y-4">
        <input type="text" x-model="form.name" placeholder="Name" required class="w-full border p-2">
        <p x-show="submitted && !form.name" class="text-red-500">Name is required</p>
        
        <input type="email" x-model="form.email" placeholder="Email" required class="w-full border p-2">
        <p x-show="submitted && !form.email" class="text-red-500">Valid email required</p>

        <input type="tel" x-model="form.phone" placeholder="Phone" required class="w-full border p-2">
        
        <button type="submit" :disabled="loading" class="bg-blue-600 text-white p-2">Book Now</button>
    </form>

    <div x-show="success" class="p-4 bg-green-100">Booking successful!</div>
    <div x-show="error" class="p-4 bg-red-100" x-text="error"></div>
</div>

<script>
function bookingForm() {
    return {
        form: { name: '', email: '', phone: '' },
        submitted: false, loading: false, success: false, error: '',
        async submitBooking() {
            this.submitted = true;
            if (!this.form.name || !this.form.email) return;
            this.loading = true;
            try {
                let response = await fetch('/book/{{ owner.slug }}/submit', {
                    method: 'POST',
                    body: new URLSearchParams(this.form)
                });
                if (response.ok) { this.success = true; } else { this.error = 'Failed to book'; }
            } catch (e) { this.error = 'Network error'; }
            this.loading = false;
        }
    }
}
</script>
