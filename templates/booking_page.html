<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ gettext('Book a Slot') }} with {{ owner.business_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .lang-toggle-container {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal flex items-center justify-center min-h-screen">
    <div class="lang-toggle-container">
        <div class="relative inline-block text-left">
            <div>
                <button type="button" class="inline-flex justify-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none" id="menu-button" aria-expanded="true" aria-haspopup="true">
                    {{ lang.upper() }}
                    <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            <div class="origin-top-right absolute right-0 mt-2 w-20 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none hidden" role="menu" aria-orientation="vertical" aria-labelledby="menu-button" tabindex="-1">
                <div class="py-1" role="none">
                    <a href="?lang=en" class="text-gray-700 block px-4 py-2 text-sm hover:bg-gray-100" role="menuitem" tabindex="-1" id="menu-item-0">EN</a>
                    <a href="?lang=ar" class="text-gray-700 block px-4 py-2 text-sm hover:bg-gray-100" role="menuitem" tabindex="-1" id="menu-item-1">AR</a>
                    <a href="?lang=fr" class="text-gray-700 block px-4 py-2 text-sm hover:bg-gray-100" role="menuitem" tabindex="-1" id="menu-item-2">FR</a>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md w-full m-4">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">{{ gettext('Book a Slot with') }} {{ owner.business_name }}</h1>
        <p class="text-center text-gray-600 mb-8">{{ gettext('Please fill out the form below to book your appointment.') }}</p>

        <form action="/book/{{ owner.slug }}/book?lang={{ lang }}" method="post" class="space-y-4">
            <div>
                <label for="customer_name" class="block text-gray-700 text-sm font-bold mb-2">{{ gettext('Your Name') }}:</label>
                <input type="text" id="customer_name" name="customer_name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <div>
                <label for="customer_email" class="block text-gray-700 text-sm font-bold mb-2">{{ gettext('Your Email') }}:</label>
                <input type="email" id="customer_email" name="customer_email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <div>
                <label for="customer_phone" class="block text-gray-700 text-sm font-bold mb-2">{{ gettext('Your Phone Number') }}:</label>
                <input type="tel" id="customer_phone" name="customer_phone" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <div>
                <label for="service" class="block text-gray-700 text-sm font-bold mb-2">{{ gettext('Service') }}:</label>
                <select id="service" name="service" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                    <option value="">{{ gettext('Select a service') }}</option>
                    {% for service_item in owner.services_json %}
                        <option value="{{ service_item.name }}">{{ service_item.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="booking_datetime_str" class="block text-gray-700 text-sm font-bold mb-2">{{ gettext('Preferred Date and Time') }}:</label>
                <input type="datetime-local" id="booking_datetime_str" name="booking_datetime_str" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">{{ gettext('Book Now') }}</button>
        </form>
    </div>
    <script>
        document.getElementById('menu-button').addEventListener('click', function() {
            const dropdown = this.nextElementSibling;
            dropdown.classList.toggle('hidden');
        });

        window.addEventListener('click', function(event) {
            if (!event.target.matches('#menu-button')) {
                const dropdowns = document.getElementsByClassName('origin-top-right');
                for (let i = 0; i < dropdowns.length; i++) {
                    const openDropdown = dropdowns[i];
                    if (!openDropdown.classList.contains('hidden')) {
                        openDropdown.classList.add('hidden');
                    }
                }
            }
        });
    </script>
</body>
</html>
