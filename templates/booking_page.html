<div x-data="bookingManager({{ owner.availability_json | tojson }})">
  <div class="grid grid-cols-7 gap-2">
    <template x-for="day in weekDays" :key="day.date">
      <button @click="selectedDate = day.date" class="p-4 border rounded" :class="{'bg-blue-500 text-white': selectedDate === day.date}">
        <span x-text="day.label"></span>
      </button>
    </template>
  </div>
  <div class="grid grid-cols-3 gap-2 mt-4">
    <template x-for="slot in availableSlots" :key="slot">
      <button class="p-2 border rounded hover:bg-gray-100" x-text="slot" @click="book(slot)"></button>
    </template>
  </div>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('bookingManager', (availability) => ({
      selectedDate: null,
      availability: availability,
      get weekDays() { /* Generate next 7 days */ },
      get availableSlots() {
        if (!this.selectedDate) return [];
        return this.availability[this.selectedDate] || [];
      },
      book(slot) { /* Logic to trigger booking modal/form */ }
    }))
  });
</script>
