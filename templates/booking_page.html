<div x-data="{ showModal: false, selectedTime: null, service: '' }">
    <!-- Time slot selection logic would be here, setting selectedTime -->
    <div class="grid grid-cols-3 gap-2">
        <button @click="selectedTime = '2023-10-27T10:00:00'; showModal = true">10:00 AM</button>
    </div>

    <template x-teleport="body">
        <div x-show="showModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" @click.outside="showModal = false">
            <div class="bg-white p-6 rounded-lg w-full max-w-md" @click.stop>
                <h2 class="text-xl font-bold mb-4">Confirm Booking</h2>
                <form action="/book/{{ owner.slug }}/submit" method="POST">
                    <input type="hidden" name="booking_datetime" x-model="selectedTime">
                    <input type="hidden" name="service" value="Default Service">
                    <div class="mb-4">
                        <label>Name</label>
                        <input type="text" name="customer_name" required class="w-full border p-2">
                    </div>
                    <div class="mb-4">
                        <label>Email</label>
                        <input type="email" name="customer_email" required class="w-full border p-2">
                    </div>
                    <div class="mb-4">
                        <label>WhatsApp Number</label>
                        <input type="tel" name="customer_phone" required class="w-full border p-2">
                    </div>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Confirm</button>
                    <button type="button" @click="showModal = false" class="ml-2">Cancel</button>
                </form>
            </div>
        </div>
    </template>
</div>
