<div x-data="bookingManager('{{ owner.slug }}')" class="p-6">
    <h1 class="text-2xl">Book with {{ owner.name }}</h1>
    <div class="mt-4">
        <input type="date" x-model="selectedDate" @change="fetchSlots()">
    </div>
    <div class="mt-4 grid grid-cols-3 gap-2">
        <template x-for="slot in availableSlots" :key="slot">
            <button 
                :disabled="bookedSlots.includes(slot)" 
                @click="selectSlot(slot)"
                x-text="slot"
                class="p-2 border rounded disabled:opacity-50">
            </button>
        </template>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('bookingManager', (slug) => ({
            selectedDate: new Date().toISOString().split('T')[0],
            availableSlots: [],
            bookedSlots: [],
            async fetchSlots() {
                const res = await fetch(`/book/${slug}/availability?date=${this.selectedDate}`);
                const data = await res.json();
                this.availableSlots = data.available_slots;
                this.bookedSlots = data.booked_slots;
            },
            init() { this.fetchSlots() }
        }))
    })
</script>
