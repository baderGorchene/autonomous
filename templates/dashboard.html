<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <title>Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <h1>Bookings</h1>
    <table>
        {% for b in bookings %}
        <tr id="booking-{{ b.id }}">
            <td>{{ b.customer_name }}</td>
            <td>{{ b.service }}</td>
            <td>{{ b.datetime }}</td>
            <td>Status: <span id="status-{{ b.id }}">{{ b.status }}</span></td>
            <td>
                <form hx-put="/book/{{ b.id }}/status" hx-target="#status-{{ b.id }}" hx-swap="innerHTML">
                    <input type="hidden" name="status" value="confirmed">
                    <button type="submit">Confirm</button>
                </form>
                <form hx-put="/book/{{ b.id }}/status" hx-target="#status-{{ b.id }}" hx-swap="innerHTML">
                    <input type="hidden" name="status" value="cancelled">
                    <button type="submit">Cancel</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
