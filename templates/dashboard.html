<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <title>Dashboard | BookSlot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">{{ _('Your Bookings') }}</h1>
        <div class="bg-white shadow overflow-hidden sm:rounded-md">
            <ul role="list" class="divide-y divide-gray-200">
                {% for booking in bookings %}
                <li class="px-6 py-4 flex justify-between items-center">
                    <div>
                        <p class="text-sm font-medium text-indigo-600">{{ booking.customer_name }}</p>
                        <p class="text-sm text-gray-500">{{ booking.service }} • {{ booking.datetime.strftime('%Y-%m-%d %H:%M') }}</p>
                    </div>
                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full {{ 'bg-green-100 text-green-800' if booking.status == 'confirmed' else 'bg-yellow-100 text-yellow-800' }}">
                        {{ booking.status|capitalize }}
                    </span>
                </li>
                {% else %}
                <li class="px-6 py-10 text-center text-gray-500">{{ _('No bookings yet.') }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
