<!DOCTYPE html><html dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}" lang="{{ lang }}"><head><meta charset="UTF-8"><title>{{ _('Dashboard') }}</title></head><body><h1>{{ _('Your Bookings') }}</h1><table><thead><tr><th>{{ _('Customer') }}</th><th>{{ _('Service') }}</th><th>{{ _('Time') }}</th></tr></thead><tbody>{% for b in bookings %}<tr><td>{{ b.customer_name }}</td><td>{{ b.service }}</td><td>{{ b.datetime }}</td></tr>{% endfor %}</tbody></table></body></html>
