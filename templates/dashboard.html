<div x-data="{ 
    search: '', 
    filterStatus: 'all', 
    bookings: {{ bookings | tojson | safe }},
    get filteredBookings() {
        return this.bookings.filter(b => 
            (this.filterStatus === 'all' || b.status === this.filterStatus) &&
            (b.customer_name.toLowerCase().includes(this.search.toLowerCase()))
        );
    }
}" class="p-6">
    <h1 class="text-2xl font-bold mb-4">My Bookings</h1>
    <div class="flex gap-4 mb-6">
        <input x-model="search" placeholder="Search clients..." class="border p-2 rounded w-full">
        <select x-model="filterStatus" class="border p-2 rounded">
            <option value="all">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
        </select>
    </div>
    <table class="w-full border-collapse">
        <thead>
            <tr class="bg-gray-100">
                <th class="border p-2">Client</th>
                <th class="border p-2">Service</th>
                <th class="border p-2">Date</th>
                <th class="border p-2">Status</th>
            </tr>
        </thead>
        <tbody>
            <template x-for="booking in filteredBookings" :key="booking.id">
                <tr>
                    <td class="border p-2" x-text="booking.customer_name"></td>
                    <td class="border p-2" x-text="booking.service"></td>
                    <td class="border p-2" x-text="booking.datetime"></td>
                    <td class="border p-2 font-bold" x-text="booking.status"></td>
                </tr>
            </template>
        </tbody>
    </table>
</div>
