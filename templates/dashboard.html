<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        'primary-50': '#EFF6FF',
                        'surface-0': '#ffffff',
                        'surface-200': '#e2e8f0',
                        'surface-900': '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        .card { @apply bg-surface-0 border border-surface-200 rounded-xl p-4 shadow-sm; }
    </style>
</head>
<body class="bg-surface-50 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-surface-900 mb-6">{{ _('Upcoming Bookings') }}</h1>
        <div class="grid gap-4">
            {% for booking in bookings %}
            <div class="card flex justify-between items-center">
                <div>
                    <p class="font-semibold">{{ booking.customer_name }}</p>
                    <p class="text-sm text-gray-500">{{ booking.service }} • {{ booking.datetime.strftime('%b %d, %H:%M') }}</p>
                </div>
                <span class="px-3 py-1 rounded-full text-xs font-medium {{ 'bg-green-100 text-green-700' if booking.status == 'confirmed' else 'bg-yellow-100 text-yellow-700' }}">
                    {{ booking.status }}
                </span>
            </div>
            {% else %}
            <div class="card text-center text-gray-500">{{ _('No upcoming bookings found.') }}</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
