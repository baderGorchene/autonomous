<!DOCTYPE html>
<html lang="{{ lang }}">
<head><title>Owner Dashboard</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 p-8">
  <h1 class="text-3xl font-bold mb-6">My Bookings</h1>
  <div class="bg-white rounded shadow overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50"><tr><th class="p-4">Client</th><th class="p-4">Service</th><th class="p-4">Time</th></tr></thead>
      <tbody>
        {% for booking in bookings %}
        <tr class="border-t">
          <td class="p-4">{{ booking.customer_name }}</td>
          <td class="p-4">{{ booking.service }}</td>
          <td class="p-4">{{ booking.datetime }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
