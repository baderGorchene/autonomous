<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>body { font-family: sans-serif; padding: 20px; } table { width: 100%; border-collapse: collapse; } th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }</style>
</head>
<body>
    <h1>Upcoming Bookings</h1>
    <table>
        <thead>
            <tr>
                <th>Customer</th>
                <th>Service</th>
                <th>Date & Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for booking in bookings %}
            <tr>
                <td>{{ booking.customer_name }}</td>
                <td>{{ booking.service }}</td>
                <td>{{ booking.datetime.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>{{ booking.status }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4">No bookings found yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
