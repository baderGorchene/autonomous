<!DOCTYPE html>
<html lang="{{ lang }}">
<head><title>{{ _('Dashboard') }}</title></head>
<body>
    <h1>{{ _('Your Bookings') }}</h1>
    <table>
        <thead>
            <tr>
                <th>{{ _('Customer') }}</th>
                <th>{{ _('Service') }}</th>
                <th>{{ _('Time') }}</th>
            </tr>
        </thead>
        <tbody>
            {% for booking in bookings %}
            <tr>
                <td>{{ booking.customer_name }}</td>
                <td>{{ booking.service }}</td>
                <td>{{ booking.datetime }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
