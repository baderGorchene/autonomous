{% extends "base.html" %}

{% block title %}{{ _('Edit Profile') }} - BookSlot{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-xl">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">{{ _('Edit Your Profile') }}</h1>

    {% if message %}
    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
        <span class="block sm:inline">{{ message }}</span>
    </div>
    {% endif %}

    <form action="/auth/profile?lang={{ lang }}" method="POST" class="bg-white shadow-md rounded-lg px-8 pt-6 pb-8 mb-4">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
                {{ _('Your Name') }}
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="name" name="name" type="text" placeholder="{{ _('Your Name') }}" value="{{ owner.name }}" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="business_name">
                {{ _('Business Name') }}
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="business_name" name="business_name" type="text" placeholder="{{ _('Your Business Name') }}" value="{{ owner.business_name }}" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="phone">
                {{ _('Phone Number (for WhatsApp notifications)') }}
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="phone" name="phone" type="tel" placeholder="{{ _('e.g., +1234567890') }}" value="{{ owner.phone if owner.phone else '' }}">
            <p class="text-xs text-gray-500 mt-1">{{ _('Include country code, e.g., +1234567890') }}</p>
        </div>
        <div class="flex items-center justify-between">
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md focus:outline-none focus:shadow-outline transition duration-300 ease-in-out" type="submit">
                {{ _('Update Profile') }}
            </button>
            <a href="/dashboard?lang={{ lang }}" class="inline-block align-baseline font-bold text-sm text-blue-600 hover:text-blue-800">
                {{ _('Back to Dashboard') }}
            </a>
        </div>
    </form>
</div>
{% endblock %}
