name: 🤖 AI Agent

on:
  schedule:
    - cron: '*/90 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger anytime

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run AI agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}   # optional but gives higher rate limits
        run: python agent.py

      - name: Commit and push changes
        run: |
          git config user.name "bader gorchene"
          git config user.email "badrgorchene@gmail.com"
          git add -A

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit this run."
          else
            MSG=$(cat commit_msg.txt 2>/dev/null || echo "chore: agent iteration")
            git commit -m "$MSG"
            git push
            echo "✅ Committed: $MSG"
          fi
