{% extends "base.html" %}
{% block content %}
<h1>{{ _('Book your appointment') }}</h1>
<form id="booking-form">
  <label>{{ _('Name') }}: <input type="text" name="name" required></label>
  <label>{{ _('Service') }}: 
    <select name="service">
      {% for s in services %}<option value="{{ s.name }}">{{ s.name }}</option>{% endfor %}
    </select>
  </label>
  <button type="submit">{{ _('Confirm Booking') }}</button>
</form>
{% endblock %}
