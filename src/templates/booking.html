<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Appointment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-surface-50 min-h-screen p-4 md:p-8">
    <div x-data="{
        slots: [], date: new Date().toISOString().split('T')[0], duration: 30, slug: window.location.pathname.split('/')[1],
        customer: {name: '', email: '', phone: ''}, selectedSlot: null,
        async fetchSlots() { this.slots = (await axios.get(`/${this.slug}/availability?date_str=${this.date}&duration=${this.duration}`)).data.slots; },
        async submitBooking() {
            await axios.post(`/${this.slug}/book`, { ...this.customer, service_name: 'Standard', datetime: this.selectedSlot });
            alert('Booking confirmed!');
        }
    }" x-init="fetchSlots()" class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">Book an Appointment</h1>
        <input type="date" x-model="date" @change="fetchSlots()" class="w-full p-2 border rounded mb-4">
        <div class="grid grid-cols-2 gap-2">
            <template x-for="slot in slots" :key="slot.start">
                <button @click="selectedSlot = slot.start" class="p-2 bg-blue-500 text-white rounded" x-text="slot.start.split('T')[1].substring(0, 5)"></button>
            </template>
        </div>
        <div x-show="selectedSlot" class="mt-4 space-y-2">
            <input x-model="customer.name" placeholder="Name" class="w-full p-2 border">
            <input x-model="customer.email" placeholder="Email" class="w-full p-2 border">
            <input x-model="customer.phone" placeholder="Phone" class="w-full p-2 border">
            <button @click="submitBooking()" class="w-full bg-green-500 text-white p-2 rounded">Confirm Booking</button>
        </div>
    </div>
</body>
</html>
